name: CI

on:
  push:
    branches: [master, main, '001-*']
  pull_request:

jobs:
  frontend:
    name: Frontend (lint, unit, corpus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  rust:
    name: Rust core (fmt, clippy, test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
      - name: cargo test
        working-directory: src-tauri
        run: cargo test

  e2e:
    name: E2E + accessibility (axe-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run sbom
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

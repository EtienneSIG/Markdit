<svg xmlns="http://www.w3.org/2000/svg" width="560" height="380" viewBox="0 0 560 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="560" height="380" fill="#1669c1"/>
  <!-- close button -->
  <rect x="500" y="16" width="36" height="28" rx="4" fill="#ffffff"/>
  <path d="M512 24 l12 12 M524 24 l-12 12" stroke="#1669c1" stroke-width="2" stroke-linecap="round"/>
  <!-- title -->
  <text x="36" y="78" fill="#ffffff" font-size="30" font-weight="600">Windows protected your PC</text>
  <!-- body -->
  <text x="36" y="120" fill="#eaf2fb" font-size="16">Microsoft Defender SmartScreen prevented an unrecognized app from</text>
  <text x="36" y="144" fill="#eaf2fb" font-size="16">starting. Running this app might put your PC at risk.</text>
  <!-- More info link (highlighted) -->
  <text x="36" y="188" fill="#ffffff" font-size="16" text-decoration="underline" font-weight="600">More info</text>
  <!-- highlight box around More info -->
  <rect x="28" y="170" width="96" height="28" rx="6" fill="none" stroke="#ff3b30" stroke-width="3"/>
  <!-- step badge + arrow -->
  <circle cx="170" cy="184" r="16" fill="#ff3b30"/>
  <text x="170" y="190" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">1</text>
  <path d="M152 184 l-18 0" stroke="#ff3b30" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Don't run button -->
  <rect x="430" y="320" width="106" height="40" rx="3" fill="#0d4f93"/>
  <text x="483" y="345" fill="#ffffff" font-size="15" text-anchor="middle">Don't run</text>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#ff3b30"/>
    </marker>
  </defs>
</svg>
